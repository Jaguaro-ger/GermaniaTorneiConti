    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <style>
        .stats-container {
            padding-top: 140px;
            max-width: 800px;
            margin: 0 auto;
            text-align: center;
            min-height: 80vh;
        }
        .player-profile {
            display: flex;
            flex-direction: column;
            align-items: center;
            background: #151515;
            border: 2px solid #d4af37;
            border-radius: 20px;
            padding: 40px;
            margin-top: 30px;
        }
        .player-profile img {
            width: 220px;
            height: 220px;
            object-fit: cover;
            border-radius: 50%;
            border: 3px solid #d4af37;
            margin-bottom: 20px;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            width: 100%;
            margin-top: 30px;
        }
        .stat-box {
            background: #090909;
            border: 1px solid #d4af37;
            border-radius: 12px;
            padding: 20px;
            transition: 0.3s ease;
        }
        .stat-box:hover {
            transform: translateY(-5px);
            background: #d4af37;
            color: black;
        }
        .stat-box:hover h4 {
            color: black;
        }
        .stat-box h4 {
            font-size: 2.5rem;
            color: #d4af37;
            font-weight: 800;
            margin-bottom: 5px;
            transition: 0.3s;
        }
        .stat-box p {
            font-size: 0.9rem;
            text-transform: uppercase;
            font-weight: 600;
            letter-spacing: 1px;
        }
        .back-btn {
            display: inline-block;
            margin-top: 40px;
            padding: 12px 35px;
            border: 2px solid #d4af37;
            color: white;
            text-decoration: none;
            font-weight: 600;
            border-radius: 50px;
            transition: 0.3s;
        }
        .back-btn:hover {
            background: #d4af37;
            color: black;
        }
    </style>
</head>
